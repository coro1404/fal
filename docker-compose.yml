version: "3.9"

services:
  web:
    build: .
    container_name: nano-banana-webapp
    ports:
      - "3321:3321"
    environment:
      # Fal.ai API Key (Pflicht)
      FAL_KEY: "${FAL_KEY}"
      # Einfaches App-Passwort (optional, Standard: changeme)
      APP_PASSWORD: "${APP_PASSWORD:-changeme}"
      NODE_ENV: production
    restart: unless-stopped

